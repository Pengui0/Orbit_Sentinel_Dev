name: Physics Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn sgp4 numpy scipy scikit-learn httpx apscheduler python-dotenv pydantic pydantic-settings websockets python-multipart pytest pytest-asyncio tinydb pymongo motor gymnasium

      - name: Run physics tests
        run: |
          cd backend && pytest tests/test_physics.py -v
